services:
  - type: web
    name: securevault-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # IMPORTANT: no trailing slash — browsers send origins without one.
      # Wrong value or a trailing slash will silently block all API calls from the frontend.
      - key: CORS_ORIGIN
        value: https://securevault-nu.vercel.app
      - key: MAX_UPLOAD_MB
        value: 10
      # ── Database (AWS RDS) — set these in the Render dashboard ──
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: 3306
      # ── JWT ──
      - key: JWT_SECRET
        sync: false
      # ── AWS S3 — set these in the Render dashboard ──
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_BUCKET_NAME
        sync: false
      # ── Server-side file encryption key ──
      # MUST be a fixed 64-char hex string (= 32 bytes / AES-256).
      # Example: openssl rand -hex 32
      # WARNING: changing this key makes ALL previously uploaded files permanently unreadable.
      # Set it ONCE in the Render dashboard and never rotate it unless you re-encrypt all files.
      - key: FILE_ENCRYPTION_KEY
        sync: false
