services:
  - type: web
    name: securevault-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://secure-vault-og.vercel.app
      - key: MAX_UPLOAD_MB
        value: 10
      # ── Database (AWS RDS) — set these in the Render dashboard ──
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: 3306
      # ── JWT ──
      - key: JWT_SECRET
        sync: false
      # ── AWS S3 — set these in the Render dashboard ──
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_BUCKET_NAME
        sync: false
      # ── Server-side file encryption key ──
      - key: FILE_ENCRYPTION_KEY
        sync: false
